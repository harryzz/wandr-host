name: build

# wandr-host builds for the HOST platform by default (no forced target in
# .cargo/config.toml), so Linux/macOS/Windows are plain `cargo build`. Android is a
# cross build via cargo-ndk and additionally needs the AOSP submodules, which build.rs
# reads to generate AIDL bindings — hence its own job with submodule caching.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   os: ubuntu-latest }
          - { name: macos-aarch64,  os: macos-latest }
          - { name: windows-x86_64, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
        with:
          # Contracts (wandr-wit) + wandr-hal-sensors are required to compile; the AOSP
          # vendor submodules are Android-only. Fetch just what the desktop build needs.
          submodules: false

      - name: Fetch required submodules (contracts, hal-sensors, skia headers)
        shell: bash
        run: |
          git submodule update --init --depth 1 contracts crates/wandr-sensors-client crates/rsbinder crates/audioclient-rs vendor/skia-src vendor/libvpx

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      # skia-safe + the winit/EGL desktop backend need X11/Wayland/GL dev headers.
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libgbm-dev: the `vaapi` feature pulls cros-codecs, which links gbm-sys
          # unconditionally even though wandr uses VA-allocated surfaces (not GBM).
          # So the vaapi build needs libgbm at link time — and the produced binary
          # has a runtime dep on libgbm.so.1, which any Mesa/GPU system has.
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libwayland-dev libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev \
            libasound2-dev libpulse-dev libfontconfig1-dev clang ninja-build \
            pkg-config nasm meson libva-dev libgbm-dev
          # dav1d (AV1, BSD-2) builds from source via meson; tell dav1d-sys to do
          # so statically instead of looking for a system .so. (meson+ninja+nasm
          # above are its toolchain.)
          echo "SYSTEM_DEPS_DAV1D_BUILD_INTERNAL=always" >> $GITHUB_ENV

      # nasm assembles libvpx's x86 SIMD. Without it libvpx silently falls back to
      # a pure-C build with badly degraded realtime encode performance, so
      # wandr-vpx-sys's build script hard-fails instead. (arm64 needs no external
      # assembler — NEON goes through the C compiler.)
      - name: macOS system deps
        if: runner.os == 'macOS'
        run: |
          # nasm: libvpx SIMD. meson+ninja: dav1d's build (AV1). arm64 dav1d uses
          # NEON so nasm isn't strictly needed for it, but the x86 path wants it.
          brew install nasm pkg-config meson ninja
          echo "SYSTEM_DEPS_DAV1D_BUILD_INTERNAL=always" >> $GITHUB_ENV

      # Claim macOS 12 as the floor for OUR code. Task 117 removed the ffmpeg
      # bottle that used to pin this harder than MACOSX_DEPLOYMENT_TARGET does —
      # libvpx is now built from source against this same target, so the artifact
      # is materially more portable than it was. This job is aarch64 and is a
      # BUILD CHECK; x86_64 is built locally on the target Mac instead (README).
      - name: macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV

      # Task 117: libvpx (BSD-3) replaced ffmpeg — built from the pinned
      # vendor/libvpx submodule and linked STATICALLY, so no libav* dev packages,
      # no GPL exposure, and no runtime .so in the artifact. Linux/macOS need NO
      # step here at all: crates/wandr-vpx-sys's build script compiles libvpx
      # itself (nasm above is its only prerequisite).
      #
      # Windows is the exception: libvpx's build is a POSIX configure that emits
      # vpx.sln for msbuild, and vcpkg's port already drives that dance AND
      # fetches NASM itself. So instead of building from source we hand
      # wandr-vpx-sys a prebuilt lib through VPX_LIB_DIR.
      #   -static-md = static lib + DYNAMIC CRT (/MD), which is what rustc's
      #   x86_64-pc-windows-msvc uses. Plain `-static` (/MT) would give LNK4098,
      #   and plain `x64-windows` would produce a vpx.dll — reintroducing exactly
      #   the runtime-DLL problem this task removes.
      - name: Windows libvpx (vcpkg, static)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install libvpx[core,realtime]:x64-windows-static-md
          $root = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          echo "VPX_LIB_DIR=$root\lib"         >> $env:GITHUB_ENV
          echo "VPX_INCLUDE_DIR=$root\include" >> $env:GITHUB_ENV

      # dav1d (AV1, BSD-2) — UNLIKE libvpx, dav1d's build system is meson, which is
      # MSVC-native (no POSIX configure, so no vcpkg needed). dav1d-sys builds it
      # statically from source when SYSTEM_DEPS_DAV1D_BUILD_INTERNAL=always; its
      # toolchain is meson (pip) + ninja + nasm. CI-iterate leg — not locally
      # verifiable on the Linux dev box.
      - name: Windows dav1d toolchain (AV1)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install meson
          # pkgconfiglite: the runner's only pkg-config is Strawberry Perl's
          # broken stub ("Found pkg-config: NO"), so dav1d-sys's system-deps
          # cannot locate even its OWN internally-built dav1d. Install a real one.
          choco install ninja nasm pkgconfiglite -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH
          echo "SYSTEM_DEPS_DAV1D_BUILD_INTERNAL=always" >> $env:GITHUB_ENV

      # Match scripts/build-host-*.{sh,bat}: they all default to P3=1 (--features
      # p3-async). It is NOT in `default`, so a plain `cargo build` yields a host with no
      # WASI 0.3 surface — guests importing wasi:sockets@0.3.0 then fail to instantiate
      # with "resource implementation is missing".
      # `vaapi` (HW H.264 decode) is Linux-only — it links the system libva, which
      # only the Linux leg installs. It matches what scripts/build-host-linux.sh
      # enables when it detects libva, so CI compiles the code that ships rather
      # than a configuration nobody runs. Runners have no GPU, so this is a
      # COMPILE check: at runtime the backend probes, finds no VA driver, and
      # declines to software — which is itself the fallback path working.
      - name: Build
        if: runner.os != 'Linux'
        run: cargo build --release --locked --features p3-async

      - name: Build (Linux, +vaapi)
        if: runner.os == 'Linux'
        run: cargo build --release --locked --features p3-async,vaapi

      - name: Test
        if: runner.os != 'Linux'
        run: cargo test --release --locked --features p3-async --no-run

      - name: Test (Linux, +vaapi)
        if: runner.os == 'Linux'
        run: cargo test --release --locked --features p3-async,vaapi --no-run

      - uses: actions/upload-artifact@v4
        with:
          name: wandr-host-${{ matrix.name }}
          path: |
            target/release/wasm-android-host
            target/release/wasm-android-host.exe
          if-no-files-found: warn

  android:
    name: android-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # The AOSP trees are large even shallow; cache them so only the first run pays.
      - name: Cache AOSP vendor submodules
        uses: actions/cache@v4
        with:
          path: |
            .git/modules/vendor
            vendor
          key: aosp-vendor-${{ hashFiles('.gitmodules') }}

      - name: Fetch submodules (contracts, hal-sensors, skia, AOSP)
        run: git submodule update --init --depth 1 --recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          key: android-aarch64

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build (aarch64-linux-android)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a --platform 30 build --release --locked --features p3-async

      - uses: actions/upload-artifact@v4
        with:
          name: wandr-host-android-aarch64
          path: target/aarch64-linux-android/release/wasm-android-host
          if-no-files-found: warn
