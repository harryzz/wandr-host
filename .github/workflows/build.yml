name: build

# wandr-host builds for the HOST platform by default (no forced target in
# .cargo/config.toml), so Linux/macOS/Windows are plain `cargo build`. Android is a
# cross build via cargo-ndk and additionally needs the AOSP submodules, which build.rs
# reads to generate AIDL bindings — hence its own job with submodule caching.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   os: ubuntu-latest }
          - { name: macos-aarch64,  os: macos-latest }
          - { name: windows-x86_64, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
        with:
          # Contracts (wandr-wit) + wandr-hal-sensors are required to compile; the AOSP
          # vendor submodules are Android-only. Fetch just what the desktop build needs.
          submodules: false

      - name: Fetch required submodules (contracts, hal-sensors, skia headers)
        shell: bash
        run: |
          git submodule update --init --depth 1 contracts crates/wandr-sensors-client crates/rsbinder crates/audioclient-rs vendor/skia-src vendor/libvpx

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      # skia-safe + the winit/EGL desktop backend need X11/Wayland/GL dev headers.
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libwayland-dev libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev \
            libasound2-dev libpulse-dev libfontconfig1-dev clang ninja-build \
            pkg-config nasm

      # nasm assembles libvpx's x86 SIMD. Without it libvpx silently falls back to
      # a pure-C build with badly degraded realtime encode performance, so
      # scripts/build-libvpx.sh hard-fails instead. (arm64 needs no external
      # assembler — NEON goes through the C compiler.)
      - name: macOS system deps
        if: runner.os == 'macOS'
        run: brew install nasm pkg-config

      # Claim macOS 12 as the floor for OUR code. Task 117 removed the ffmpeg
      # bottle that used to pin this harder than MACOSX_DEPLOYMENT_TARGET does —
      # libvpx is now built from source against this same target, so the artifact
      # is materially more portable than it was. This job is aarch64 and is a
      # BUILD CHECK; x86_64 is built locally on the target Mac instead (README).
      - name: macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV

      # Task 117: libvpx (BSD-3) replaced ffmpeg. Built from the pinned
      # vendor/libvpx submodule and linked STATICALLY, so no libav* dev packages,
      # no GPL exposure, and no runtime .so in the artifact.
      - name: Build libvpx (static)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./scripts/build-libvpx.sh
          OUT="$PWD/target/libvpx/$(rustc -vV | awk '/^host:/{print $2}')"
          {
            echo "VPX_LIB_DIR=$OUT/lib"
            echo "VPX_INCLUDE_DIR=$OUT/include"
            echo "VPX_VERSION=1.16.0"
            echo "VPX_STATIC=1"
          } >> "$GITHUB_ENV"

      # Windows uses vcpkg rather than our configure+make script: libvpx's build is
      # a POSIX configure that emits vpx.sln for msbuild, and vcpkg's port already
      # drives that dance AND fetches NASM itself.
      #   -static-md = static lib + DYNAMIC CRT (/MD), which is what rustc's
      #   x86_64-pc-windows-msvc uses. Plain `-static` (/MT) would give LNK4098,
      #   and plain `x64-windows` would produce a vpx.dll — reintroducing exactly
      #   the runtime-DLL problem this task removes.
      - name: Windows libvpx (vcpkg, static)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install libvpx[core,realtime]:x64-windows-static-md
          $root = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          # env-libvpx-sys hardcodes `rustc-link-lib=static=libvpx` on Windows (so
          # it looks for libvpx.lib), but vcpkg installs vpx.lib. Alias it rather
          # than routing through pkg-config, which Windows runners may not have.
          Copy-Item "$root\lib\vpx.lib" "$root\lib\libvpx.lib" -Force
          echo "VPX_LIB_DIR=$root\lib"         >> $env:GITHUB_ENV
          echo "VPX_INCLUDE_DIR=$root\include" >> $env:GITHUB_ENV
          echo "VPX_VERSION=1.16.0"            >> $env:GITHUB_ENV
          echo "VPX_STATIC=1"                  >> $env:GITHUB_ENV

      # Match scripts/build-host-*.{sh,bat}: they all default to P3=1 (--features
      # p3-async). It is NOT in `default`, so a plain `cargo build` yields a host with no
      # WASI 0.3 surface — guests importing wasi:sockets@0.3.0 then fail to instantiate
      # with "resource implementation is missing".
      - name: Build
        run: cargo build --release --locked --features p3-async

      - name: Test
        run: cargo test --release --locked --features p3-async --no-run

      - uses: actions/upload-artifact@v4
        with:
          name: wandr-host-${{ matrix.name }}
          path: |
            target/release/wasm-android-host
            target/release/wasm-android-host.exe
          if-no-files-found: warn

  android:
    name: android-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # The AOSP trees are large even shallow; cache them so only the first run pays.
      - name: Cache AOSP vendor submodules
        uses: actions/cache@v4
        with:
          path: |
            .git/modules/vendor
            vendor
          key: aosp-vendor-${{ hashFiles('.gitmodules') }}

      - name: Fetch submodules (contracts, hal-sensors, skia, AOSP)
        run: git submodule update --init --depth 1 --recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          key: android-aarch64

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build (aarch64-linux-android)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a --platform 30 build --release --locked --features p3-async

      - uses: actions/upload-artifact@v4
        with:
          name: wandr-host-android-aarch64
          path: target/aarch64-linux-android/release/wasm-android-host
          if-no-files-found: warn
